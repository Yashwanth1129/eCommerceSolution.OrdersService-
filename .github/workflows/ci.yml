name: Orders Service CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/orders-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore eCommerceSolution.OrdersService/eCommerceSolution.OrdersService.csproj

      - name: Build
        run: dotnet build eCommerceSolution.OrdersService/eCommerceSolution.OrdersService.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Build Docker Image
        run: |
          docker build \
            -f eCommerceSolution.OrdersService/Dockerfile \
            -t $IMAGE_NAME:${{ github.run_number }} \
            eCommerceSolution.OrdersService

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.run_number }}